name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the other precision/python combos when one fails — we want
      # to see f32 vs f64 results independently.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        # Numerical precision matrix: run the whole suite in both float32 and
        # float64 so float64 support cannot silently rot (see ham.utils.config).
        jax-x64: ["0", "1"]

    name: py${{ matrix.python-version }} x64=${{ matrix.jax-x64 }}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run tests with pytest
      env:
        JAX_PLATFORMS: cpu
        # Precision is selected by JAX's native flag, read at `import jax`.
        JAX_ENABLE_X64: ${{ matrix.jax-x64 }}
      run: |
        uv run pytest tests/ -v --timeout=300
